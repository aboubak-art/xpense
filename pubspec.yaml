name: xpense
description: "Premium offline-first expense tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  drift: ^2.16.0
  drift_flutter: ^0.1.0

  # Code Generation & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.3

  # Charts
  fl_chart: ^0.66.0

  # UI & Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  local_auth: ^2.2.0
  image_picker: ^1.0.7
  path: ^1.9.0
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.21
  permission_handler: ^11.3.0

  # Cloud Sync
  supabase_flutter: ^2.3.4

  # Haptics
  vibration: ^3.1.0

  # Logging
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^5.1.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  drift_dev: ^2.16.0
  riverpod_generator: ^2.3.11
  go_router_builder: ^2.4.1
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

flutter_native_splash:
  color: "#0F172A"
  image: assets/images/splash_logo.png
  color_dark: "#0F172A"
  image_dark: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#0F172A"
    image_dark: assets/images/splash_logo.png
    icon_background_color_dark: "#0F172A"
  web: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
